services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SERVE_STATIC: "true"
      STATIC_DIR: /app/public
      DB_PATH: /data/lottery.db
    volumes:
      - lottery-data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    profiles:
      - with-https

volumes:
  lottery-data:
  caddy-data:
  caddy-config:
